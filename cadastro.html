<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css"
    <title>Formulário de Cadastro</title>
</head>
<body class="container">
    <main style="margin-top: 200px;">
    <h1>Cadastro de viajantes</h1>
    <form action="#" onsubmit="enviarFormulario(event)" method="get" enctype="multipart/form-data">
        <!-- DADOS PESSOAIS -->
        <fieldset class="form-control mb-3">
            <legend> Dados Pessoais</legend>
            <label for="nome">Nome Completo</label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu nome" title="Digite seu nome completo sem abreviações" class="form-control" required>
            <label for="idade">Idade</label>
            <input type="number" name="idade" id="idade" class="form-control" onchange="verificarIdade()" required>

            <label for="nome">Cep</label>
            <input type="text" name="cep" id="cep" placeholder="Digite seu Cep" title="Digite seu Cep" class="form-control" required>
            <br>
            <button type="button" onclick="buscarCep()">Buscar</button>
            <br>

            <label for="nome">Logradouro</label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu Logradouro" title="Digite seu nome completo sem abreviações" class="form-control" required>

            <label for="nome">Bairro</label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu Bairro" title="Digite seu nome completo sem abreviações" class="form-control" required>

            <label for="nome">cidade</label>
            <input type="text" name="nome" id="nome" placeholder="Digite sua Cidade" title="Digite seu nome completo sem abreviações" class="form-control" required>

            <label for="nome">Uf</label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu Bairro" title="Digite seu nome completo sem abreviações" class="form-control" required>
        </fieldset>
        <fieldset class="form-control mb-3">
            <legend>Contato</legend>
            <label for="telefone">Telefone</label>
            <input type="tel" name="telefone" id="telefone" class="form-control" placeholder="(21)99999-9999" pattern="^\(\d{2}\)\d{5}-\d{4}$"
            title="Formato:(21)99999-9999">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="exemplo@email.com" class="form-control" required>
        </fieldset>
        <fieldset class="form-control mb-3">
            <legend>Preferências de viagem</legend>
            <label for="destino">Destino</label>
            <input type="text" name="destino" id="destino" class="form-control" placeholder="Ex: Paris, NY, Istambul">
            <label for="tipo">Tipo</label>
            <select name="tipo" id="tipo" class="form-control">
                <option value="praia">Praia</option>
                <option value="aventura">Aventura</option>
                <option value="romantico">Romântico</option>
                <option value="cultural">Cultural</option>
            </select>
            <label for="dataIda">Data de ida</label>
            <input type="date" name="dataIda" id="dataIda" class="form-control">
            <label for="dataVolta">Data de volta</label>
            <input type="date" name="dataVolta" id="dataVolta" class="form-control">
            <p>Deseja receber promoções de viagens?</p>
            <input type="radio" name="promo" id="sim" value="sim"><label for="sim">Sim</label>
            <input type="radio" name="promo" id="nao" value="nao"><label for="nao">Não</label>
        </fieldset>
        <fieldset class="form-control mb-3">
            <legend>Outros</legend>
            <label for="passaporte">Upload de passaporte (opicional)</label>
            <input type="file" name="passaporte" id="passaporte" class="form-control">
            <label for="cor">Cor favorita para tema da viagem</label>
            <input type="color" name="cor" id="cor">
            <p>Hobbies</p>
            <input type="checkbox" name="hobbies1" id="revista">
            <label for="revista">Revista</label>
            <input type="checkbox" name="hobbies2" id="jornal">
            <label for="jornal">Jornal</label>
        </fieldset>

        
        <button class="btn btn-info" type="submit">Cadastrar</button>
        <button class="btn btn-danger" type="reset">Limpar</button>

    </form>
    </main>
    <div id="resultado"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>

    <footer> <!-- rodapé da página -->
        <div class="footer-container">
            <div class="footer-copy">
                <p>&copy; 2026 Jornada Viagens. Todos os direitos reservados</p>
            </div>
            <!-- criar uma ancora de link -->
            <a name="contato"></a> 
            <address class="footer-contato">
                <h2>Contato</h2>
                <p>Email: contato@jornadaviagens.com.br
                <p>Tel/WhatsApp: (21)91234-1234           
            </address>
            <nav class="footer-redes" aria-label="Redes Sociais">
                <a href="https://pt-br.facebook.com/" target="_blank" aria-label="facebook"><img src="img/facebook-icon.png"></a>
                <a href="https://www.instagram.com/" target="_blank" aria-label="instagram"><img src="img/instagram-icon.png"></a>
                <a href="https://x.com/" target="_blank" aria-label="x"><img src="img/x-icon.avif"></a>
            </nav>
        </div>
    </footer>
</body>
</html>
